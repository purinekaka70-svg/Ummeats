<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Tamu Express Admin</title>
  <link
    rel="icon"
    type="image/png"
    href="https://i.ibb.co/KzFZpw0V/Gemini-Generated-Image-bl807jbl807jbl80.png"
  />
  <link rel="apple-touch-icon" href="https://i.ibb.co/KzFZpw0V/Gemini-Generated-Image-bl807jbl807jbl80.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar panel">
      <div class="brand-block">
        <p class="eyebrow">Admin page</p>
        <a href="./admin.html" class="brand">Tamu Express Admin</a>
      </div>

      <div class="topbar-actions">
        <a class="button button-ghost" href="./index.html">Back To Site</a>
      </div>
    </header>

    <main class="content-shell">
      <div id="app" class="view-root"></div>
    </main>

    <footer class="footer footer--static panel">
      <p class="footer-title">Admin</p>
      <span id="year"></span>
    </footer>
  </div>

  <button
    class="button button-primary notification-fab is-hidden"
    id="adminNotificationPromptButton"
    type="button"
    aria-label="Enable browser notifications for admin"
  >
    Enable Notifications
  </button>

  <div id="toastContainer" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="./admin-page.js"></script>
