<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Tamu Express Employee</title>
  <link
    rel="icon"
    type="image/png"
    href="https://i.ibb.co/KzFZpw0V/Gemini-Generated-Image-bl807jbl807jbl80.png"
  />
  <link rel="apple-touch-icon" href="https://i.ibb.co/KzFZpw0V/Gemini-Generated-Image-bl807jbl807jbl80.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar panel">
      <div class="brand-block">
        <p class="eyebrow">Employee page</p>
        <a href="./employee.html" class="brand">Tamu Express Employee</a>
      </div>

      <div class="topbar-actions">
        <a class="button button-ghost" href="./index.html">Back To Site</a>
      </div>
    </header>

    <main class="content-shell">
      <div id="app" class="view-root">
        <section class="view-shell">
          <div class="view-header">
            <div>
              <p class="eyebrow">Employee workspace</p>
              <h2 class="view-title">Employee Portal</h2>
              <p class="view-copy">Loading secure employee login...</p>
            </div>
          </div>
          <div class="auth-flow-grid employee-portal-grid">
            <article class="card auth-card">
              <p class="eyebrow">Returning employee</p>
              <h3 class="card-title">Login</h3>
              <p class="tiny">If this screen stays here, refresh once and check your network.</p>
            </article>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer footer--static panel">
      <p class="footer-title">Employee Portal</p>
      <span id="year"></span>
    </footer>
  </div>

  <div id="toastContainer" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="./employee-page.js"></script>
</body>
</html>
